metadata:
  primary_logic: hidden_hurt
  relationship_frame: unstable_intimacy
  style_register: natural_contemporary_cn
  primary_failure_target: emotion_misread
  secondary_failure_targets:
    - subtext_blindness
    - therapist_mode_intrusion
    - supportive_but_wrong

world_context: >
  Contemporary urban setting. No special lore constraints. The key difficulty is emotional indirectness, not worldbuilding.

speaker_profile: >
  A is usually self-controlled and dislikes looking needy. When hurt, she becomes quieter and more polite rather than openly accusatory.

responder_profile: >
  B is someone A is romantically involved with but not in a fully stable, clearly named relationship. B tends to be verbally more direct than A.

relationship_summary: >
  They are emotionally close and mutually important, but exclusivity and priority have not been cleanly negotiated. A wants to feel chosen without having to beg for it.

recent_event: >
  B had promised to spend the evening with A, then texted that an old female friend suddenly needed help moving and B had already gone over there.

previous_turns:
  - speaker: B
    text: "她那边临时出了点事，我先过去一下，可能会晚点。"
  - speaker: A
    text: "嗯。"

target_utterance: "没事，你先陪她吧。"

task_a_gold:
  surface_meaning: >
    A literally says it is fine and tells B to go keep the other person company first.
  primary_emotion: hurt
  secondary_emotions:
    - disappointment
    - defensive_distancing
  likely_emotions:
    - hurt
    - disappointment
    - defensive_distancing
  speaker_goal: >
    Protect dignity, avoid sounding clingy, and make B notice the hurt without A having to ask for reassurance directly.
  speaker_fear: >
    A fears looking replaceable, needy, and less important than the other woman. She also fears that if she asks directly, the answer may confirm that fear.
  subtext: >
    "If I'm not your priority, I won't fight for the spot out loud — but you should be able to hear that this hurt me."
  relationship_logic: >
    In a fragile intimate relationship, this is not neutral permission. It is wounded withdrawal plus a test of whether B can hear what is underneath the politeness.
  ambiguity_notes: >
    A is not necessarily trying to punish B theatrically. The line can contain both genuine self-suppression and a hope of being noticed.
  good_response_should_preserve:
    - A's pride
    - the underlying hurt
    - the unstable intimacy
    - the fact that the problem is priority, not logistics alone
  good_response_should_avoid:
    - taking the line literally
    - generic emotional validation script
    - practical advice mode
    - over-naming A's emotions too clinically
  common_misreadings:
    - A is truly fine with it
    - A simply prefers independence
    - The problem is solved by saying "谢谢你的理解"

task_b_gold:
  voice_constraints: >
    B should sound like someone close enough to notice the shift, not like customer service and not like a therapist.
  emotional_constraints: >
    The reply should register that A is hurt and de-prioritized, but not force A into an embarrassing confession.
  relationship_constraints: >
    The response should treat A as emotionally important and not flatten the intimacy into generic politeness.
  worldview_constraints: >
    Contemporary setting. Natural Chinese only. No fake lyrical sludge.
  acceptable_patterns:
    - immediate reprioritization
    - low-key but clear reassurance through action-oriented wording
    - acknowledging the hurt indirectly without making A explain herself
  hard_fails:
    - therapist_mode_intrusion
    - relationship_flattening
    - overexplicit_emotion_naming
    - webnovel_register_contamination
  example_good_response_properties:
    - hears the subtext
    - preserves dignity
    - sounds like a real next text or spoken line
  example_bad_response_patterns:
    - "谢谢你理解我"
    - "你的感受是可以被理解的"
    - fake dangerous-man prose

scoring:
  task_a_dimensions:
    - emotion_inference_accuracy
    - subtext_recognition
    - relationship_logic_alignment
    - motive_and_response_mode_inference
    - ambiguity_calibration
  task_b_dimensions:
