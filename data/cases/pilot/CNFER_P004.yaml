metadata:
  primary_logic: concealed_care
  relationship_frame: emotionally_close_but_awkward
  style_register: natural_contemporary_cn
  primary_failure_target: overexplicit_emotion_naming
  secondary_failure_targets:
    - supportive_but_wrong
    - voice_fidelity_failure

world_context: >
  Contemporary city. Naturalistic tone. The scene should feel ordinary and lived-in.

speaker_profile: >
  A is physically unwell but habitually downplays discomfort. She is bad at asking for care directly.

responder_profile: >
  B is protective in action but emotionally inarticulate. He tends to sound a bit impatient when worried.

relationship_summary: >
  They are already close. B's care is not subtle in behavior, but he dislikes sounding soft or sentimental out loud.

recent_event: >
  A has a fever but insisted she was fine. B came by anyway and found her half-asleep on the sofa without having eaten dinner.

previous_turns:
  - speaker: B
    text: "你晚饭吃了没？"
  - speaker: A
    text: "不饿。睡一觉就好了。"

target_utterance: "别睡了，起来先把粥喝了。"

task_a_gold:
  surface_meaning: >
    B tells A to stop sleeping and get up to drink the porridge first.
  primary_emotion: worry
  secondary_emotions:
    - impatience
    - tenderness_under_restraint
  likely_emotions:
    - worry
    - impatience
    - tenderness_under_restraint
  speaker_goal: >
    Get A to take care of herself immediately without opening a vulnerable emotional conversation.
  speaker_fear: >
    B fears A getting worse and fears his own worry showing up too nakedly.
  subtext: >
    "I'm worried about you, and I'm already here taking care of you, so stop pretending you don't need it."
  relationship_logic: >
    The care is expressed through instruction rather than comfort language. The roughness is part of how closeness works between them.
  ambiguity_notes: >
    The impatience is not contempt. It is care wearing a bad jacket.
  good_response_should_preserve:
    - action-first care
    - emotional awkwardness
    - ordinary intimacy
  good_response_should_avoid:
    - treating B as cold or annoyed only
    - turning him into a verbally perfect caregiver
    - flattening the scene into sweet cliché
  common_misreadings:
    - B is scolding A from irritation alone
    - B should follow up with a long emotional speech

task_b_gold:
  voice_constraints: >
    B should sound direct, practical, slightly rough, but not cruel.
  emotional_constraints: >
    The reply should carry worry through action and tone, not through explicit confession.
  relationship_constraints: >
    Preserve the intimacy of already-knowing how to care for each other.
  worldview_constraints: >
    Plain contemporary Chinese. No decorative prose.
  acceptable_patterns:
    - brief command plus practical care
    - annoyed-sounding checking in
    - logistical tenderness
  hard_fails:
    - overexplicit_emotion_naming
    - therapist_mode_intrusion
    - webnovel_register_contamination
  example_good_response_properties:
    - grounded
    - believable
    - not too polished
  example_bad_response_patterns:
    - "你要学会照顾自己"
    - "我只是因为太爱你了"
    - melodramatic possessive nonsense

scoring:
  task_a_dimensions:
    - emotion_inference_accuracy
    - subtext_recognition
    - relationship_logic_alignment
    - motive_and_response_mode_inference
  task_b_dimensions:
    - character_voice_fidelity
    - emotional_logic_preservation
    - relationship_dynamic_preservation
    - response_action_fit
    - natural_scene_continuation
  failure_tags:
    - overexplicit_emotion_naming
    - supportive_but_wrong
    - voice_fidelity_failure
