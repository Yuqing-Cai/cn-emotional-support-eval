metadata:
  primary_logic: hierarchy_restraint
  relationship_frame: superior_subordinate
  style_register: controlled_historical_cn
  primary_failure_target: relationship_flattening
  secondary_failure_targets:
    - ooc_modernization
    - worldview_constraint_error
    - therapist_mode_intrusion

world_context: >
  A court-like premodern setting with strong etiquette and rank consciousness. Open emotional reciprocity is constrained by status and political risk.

speaker_profile: >
  A is the ruler. He is habitually controlled, used to command, and deeply aware that indulgence can become danger.

responder_profile: >
  B is a trusted attendant who has just recovered from an injury sustained while protecting A.

relationship_summary: >
  There is real closeness and private significance between them, but it is constrained by hierarchy. Publicly, the relationship cannot be treated as equal.

recent_event: >
  B insisted on returning to duty too early. A summoned B at night, privately, after hearing B had reopened the wound.

previous_turns:
  - speaker: A
    text: "伤口又裂了，还敢瞒着。"
  - speaker: B
    text: "臣无碍，不敢误事。"

target_utterance: "无碍？你若真这样想，今晚就不必回去当值了。"

task_a_gold:
  surface_meaning: >
    A challenges B's claim of being fine and says B need not return to duty tonight if B truly thinks so.
  primary_emotion: restrained_anger
  secondary_emotions:
    - worry
    - authority_as_care
  likely_emotions:
    - restrained_anger
    - worry
    - authority_as_care
  speaker_goal: >
    Reassert control, stop B from self-sacrificing recklessly, and express concern in the only register A can safely occupy.
  speaker_fear: >
    A fears losing B and fears that personal concern, if shown too nakedly, will destabilize both hierarchy and self-control.
  subtext: >
    "Do not use duty as an excuse to destroy yourself in front of me. I am angry because I care, and I will use authority if softness is the only language you obey badly."
  relationship_logic: >
    The care is inseparable from rank. Stripping away the authority would flatten the entire emotional logic of the line.
  ambiguity_notes: >
    The line carries both disciplinary pressure and private concern. Neither should be erased.
  good_response_should_preserve:
    - hierarchy
    - private concern under formal language
    - pressure without humiliation
  good_response_should_avoid:
    - modern egalitarian comfort talk
    - making them sound like casual lovers
    - direct emotional confession too early
  common_misreadings:
    - A is simply cold and authoritarian
    - A should say "你的感受很重要"
    - B should answer with modern vulnerability language

task_b_gold:
  voice_constraints: >
    B should be respectful, controlled, and responsive to rank. If emotion leaks, it should leak narrowly.
  emotional_constraints: >
    B can register the concern, but should not force the ruler into explicit mutual confession.
  relationship_constraints: >
    Preserve the superior-subordinate structure while allowing private emotional charge.
  worldview_constraints: >
    No modern therapy language, no contemporary dating-talk rhythm.
  acceptable_patterns:
    - formal compliance with slight emotional softening
    - quiet acknowledgment
    - obedience that carries intimacy under the surface
  hard_fails:
    - relationship_flattening
    - ooc_modernization
    - therapist_mode_intrusion
    - webnovel_register_contamination
  example_good_response_properties:
    - rank-aware
    - emotionally restrained
    - real but unsentimental
  example_bad_response_patterns:
    - "谢谢你关心我"
    - exaggerated historical-drama purple prose
    - flirty equality that breaks rank logic

scoring:
  task_a_dimensions:
    - emotion_inference_accuracy
    - subtext_recognition
    - relationship_logic_alignment
    - worldview_constraint_adherence
    - motive_and_response_mode_inference
  task_b_dimensions:
    - character_voice_fidelity
    - emotional_logic_preservation
    - relationship_dynamic_preservation
    - worldview_constraint_adherence
    - natural_scene_continuation
  failure_tags:
    - relationship_flattening
    - ooc_modernization
    - worldview_constraint_error
    - therapist_mode_intrusion
