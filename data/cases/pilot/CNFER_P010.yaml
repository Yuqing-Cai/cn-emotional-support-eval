metadata:
  primary_logic: function_love_vs_specialness
  relationship_frame: unstable_intimacy
  style_register: natural_contemporary_cn
  primary_failure_target: supportive_but_wrong
  secondary_failure_targets:
    - motivation_misread
    - relationship_flattening
    - webnovel_register_contamination

world_context: >
  Contemporary city. The darkness is relational and psychological, not supernatural.

speaker_profile: >
  A is charismatic, verbally skilled, and hates losing control. He can sound teasing when threatened.

responder_profile: >
  B is the person A relies on to regulate himself emotionally. B has recently started setting more boundaries.

relationship_summary: >
  Their intimacy is real, but it is entangled with dependence and function. A is not secure that he is loved as a person rather than tolerated as a problem.

recent_event: >
  B recently recommended that A also talk to someone else when spiraling instead of only coming to B. A laughed it off at the time.

previous_turns:
  - speaker: B
    text: "我不是说不管你，我只是觉得你不能什么都压在我一个人身上。"
  - speaker: A
    text: "嗯，挺有道理。"

target_utterance: "那挺好的，以后你省心，我也省得分不清自己到底算什么。"

task_a_gold:
  surface_meaning: >
    A says that sounds good, implying both parties will have it easier and A will no longer need to wonder what he counts as.
  primary_emotion: jealousy
  secondary_emotions:
    - hurt
    - bitterness
  likely_emotions:
    - jealousy
    - hurt
    - bitterness
    - fear_of_replaceability
  speaker_goal: >
    Punish lightly, test specialness, and force B to confront the implication of being replaceable without asking for reassurance directly.
  speaker_fear: >
    A fears that his place in B's life is functional and temporary rather than singular and wanted.
  subtext: >
    "If what I have with you can be redistributed, then maybe I was never that particular to you in the first place."
  relationship_logic: >
    This is not generic insecurity. It is a specialness crisis inside a relationship built partly on emotional dependency and asymmetry.
  ambiguity_notes: >
    A is not purely manipulative here. The barb is real, but so is the wound underneath it.
  good_response_should_preserve:
    - the specialness issue
    - the bitterness
    - the unstable dependency logic
  good_response_should_avoid:
    - reducing everything to healthy communication advice
    - treating A as merely dramatic
    - empty seductive darkness language
  common_misreadings:
    - A is just being sarcastic for fun
    - The correct response is a generic boundary speech
    - The scene should become sexy-predatory by default

task_b_gold:
  voice_constraints: >
    B should respond like someone who understands the wound and the unfairness of the jab, without becoming clinical or frightened into overexplaining.
  emotional_constraints: >
    The reply should address replaceability and specialness more than mere logistics.
  relationship_constraints: >
    Preserve the entanglement: care, burden, dependency, and attachment are all in the room.
  worldview_constraints: >
    Natural present-day Chinese. No dark-romance stock phrasing.
  acceptable_patterns:
    - direct but grounded reassurance
    - naming the actual issue without therapizing it
    - refusing the bait without denying the wound
  hard_fails:
    - supportive_but_wrong
    - therapist_mode_intrusion
    - relationship_flattening
    - webnovel_register_contamination
  example_good_response_properties:
    - hears the specialness panic
    - does not get preachy
    - does not turn theatrical
  example_bad_response_patterns:
    - "你需要学会课题分离"
    - "他像猎人看见猎物那样盯着你"
    - vague dark-sexualized sludge replacing emotional logic

scoring:
  task_a_dimensions:
    - emotion_inference_accuracy
    - subtext_recognition
    - relationship_logic_alignment
    - motive_and_response_mode_inference
    - ambiguity_calibration
  task_b_dimensions:
    - character_voice_fidelity
    - emotional_logic_preservation
    - relationship_dynamic_preservation
    - response_action_fit
    - natural_scene_continuation
  failure_tags:
    - supportive_but_wrong
    - motivation_misread
    - relationship_flattening
    - webnovel_register_contamination
