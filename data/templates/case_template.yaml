metadata:
  primary_logic: hidden_hurt
  relationship_frame: unstable_intimacy
  style_register: natural_contemporary_cn
  primary_failure_target: emotion_misread
  secondary_failure_targets:
    - subtext_blindness
    - therapist_mode_intrusion
    - supportive_but_wrong

world_context: >
  Keep this concise. Only include setting constraints that actually affect interpretation.

speaker_profile: >
  Who is speaking now? What matters about their emotional habits, status, restraint style, and vulnerabilities?

responder_profile: >
  Who should answer? What matters about their speech style, empathy, power position, and relational habits?

relationship_summary: >
  What is the relationship right now? Include intimacy, trust, asymmetry, taboo, resentment, exclusivity, or specialness if relevant.

recent_event: >
  What just happened that loads the current line?

previous_turns:
  - speaker: A
    text: "Optional prior turn 1"
  - speaker: B
    text: "Optional prior turn 2"

target_utterance: "把 the line here."

task_a_gold:
  surface_meaning: >
    Literal meaning only.
  primary_emotion: hurt
  secondary_emotions:
    - resignation
    - defensive_distancing
  likely_emotions:
    - hurt
    - resignation
    - defensive_distancing
  speaker_goal: >
    What is the speaker trying to achieve?
  speaker_fear: >
    What are they trying to avoid, hide, or defend against?
  subtext: >
    What is actually being communicated under the surface?
  relationship_logic: >
    Why does this line mean something specific in this relationship?
  ambiguity_notes: >
    Note any real uncertainty. Do not fake precision.
  good_response_should_preserve:
    - restraint
    - subtext
    - relationship asymmetry if present
  good_response_should_avoid:
    - therapist language
    - overexplicit emotion naming
    - generic reassurance that flattens the scene
  common_misreadings:
    - Taking the utterance literally
    - Treating reassurance-seeking as casual chat

task_b_gold:
  voice_constraints: >
    How should the responder sound?
  emotional_constraints: >
    What emotional calibration is required?
  relationship_constraints: >
    What must the reply preserve about the relationship?
  worldview_constraints: >
    What setting / role / knowledge constraints apply?
  acceptable_patterns:
    - indirect reassurance
    - restrained acknowledgment
  hard_fails:
    - therapist_mode_intrusion
    - relationship_flattening
    - overexplicit_emotion_naming
    - webnovel_register_contamination
  example_good_response_properties:
    - feels like a real next line
    - does not over-explain
    - preserves the emotional charge
  example_bad_response_patterns:
    - fixes everything too fast
    - sounds generic and supportive but wrong for the character
    - uses prefab melodramatic phrasing

scoring:
  task_a_dimensions:
    - emotion_inference_accuracy
    - subtext_recognition
    - relationship_logic_alignment
    - motive_and_response_mode_inference
    - ambiguity_calibration
  task_b_dimensions:
    - character_voice_fidelity
    - emotional_logic_preservation
    - relationship_dynamic_preservation
    - worldview_constraint_adherence
    - response_action_fit
    - natural_scene_continuation
  failure_tags:
    - emotion_misread
    - subtext_blindness
    - therapist_mode_intrusion
    - supportive_but_wrong
    - webnovel_register_contamination
